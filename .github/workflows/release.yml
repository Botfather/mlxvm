name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install build
      - run: python -m build
      - uses: actions/attest-build-provenance@v3
        with:
          subject-path: "dist/*"
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
      - uses: actions/upload-artifact@v4
        with:
          name: release-distributions
          path: dist/
      - run: |
          gh release create "$GITHUB_REF_NAME" dist/* --generate-notes \
            || gh release upload "$GITHUB_REF_NAME" dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  homebrew:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Bump Homebrew formula in tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          url="https://github.com/${GITHUB_REPOSITORY}/archive/refs/tags/${TAG}.tar.gz"
          sha="$(curl -fsSL "$url" | sha256sum | cut -d' ' -f1)"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/Botfather/homebrew-tap.git" tap
          cd tap
          sed -i -E "s#^( *url ).*#\1\"${url}\"#" Formula/mlxvm.rb
          sed -i -E "s#^( *sha256 ).*#\1\"${sha}\"#" Formula/mlxvm.rb
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "Formula already up to date for ${version}"
            exit 0
          fi
          git commit -am "mlxvm ${version}"
          git push
